<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>公共物品與搭便車｜魔法拍賣合作社</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f9e7b3 0%, #f5c542 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Poppins', '微軟正黑體', cursive, sans-serif;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }

        .game-container {
            max-width: 100%;
            margin: 0 auto;
            background: rgba(255, 248, 225, 0.9);
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            padding: 15px;
        }

        /* 設定區塊 (初始彈窗) */
        .setup-overlay, .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .setup-card, .modal-card {
            background: #fff8e7;
            border-radius: 40px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            text-align: center;
            border: 3px solid #ffcd94;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 10px 0;
            background: linear-gradient(135deg, #2c5a2e, #a5673f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #3b2a1f;
            background: #fff0bf;
            display: block;
            margin: 0 auto 15px;
            padding: 5px 15px;
            border-radius: 60px;
        }

        .players-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .player-card {
            background: #fffcf0;
            border-radius: 25px;
            padding: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            border: 2px solid #ffdd99;
            text-align: center;
        }
        .player-card.current-turn {
            border: 3px solid #f5a623;
            background: #fff7e8;
            box-shadow: 0 0 10px #ffd966;
        }
        .player-name {
            font-size: 1.1rem;
            font-weight: bold;
            background: #ffe0a3;
            border-radius: 15px;
            padding: 4px;
            margin-bottom: 8px;
        }
        .funds {
            font-size: 1.1rem;
            font-weight: bold;
            background: #d9e6b3;
            border-radius: 15px;
            padding: 5px;
            color: #2b4f2b;
        }

        /* 彈窗內的出價表單 */
        .bid-turn-input {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }
        .bid-turn-input input, .bid-turn-input select {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 15px;
            border: 2px solid #cb9e5e;
            background: white;
        }
        .bid-turn-input label {
            font-weight: bold;
            color: #5d4037;
            text-align: left;
            display: block;
            margin-bottom: 5px;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }

        .next-btn { background: #3b9e3d; color: white; box-shadow: 0 4px 0 #1e5a20; }
        .resolve-btn { background: #f0a500; color: white; box-shadow: 0 4px 0 #b46f00; }
        .start-turn-btn { background: #b5712e; color: white; margin-bottom: 10px; }

        .round-info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 5px;
        }
        .round-tag {
            background: #b5712e;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .public-goods-showcase {
            background: #f0dba8;
            border-radius: 25px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .goods-icons {
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }
        .goods-icons span {
            background: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9rem;
        }

        .log-area {
            background: #2d2b1fcc;
            border-radius: 25px;
            padding: 12px;
            color: #fef2cf;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        
        .magic-badge {
            background: #f5bc70;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 0.65rem;
            margin: 2px;
            display: inline-block;
        }

        footer { text-align: center; font-size: 0.7rem; margin-top: 10px; color: #382812; opacity: 0.8; }
    </style>
</head>
<body>

<!-- 初始設定彈窗 -->
<div id="setupOverlay" class="setup-overlay">
    <div class="setup-card">
        <h2>🎭 開局設定 🎭</h2>
        <p>請選擇玩家人數與名稱</p>
        <input type="number" id="playerCountInput" min="2" max="6" value="4" style="width:80px; text-align:center; font-size:1.2rem; padding:5px; border-radius:10px;">
        <button id="generateNameFields" class="btn-main" style="background:#cb9e5e; color:white;">✏️ 產生名稱欄位</button>
        <div id="playerNamesContainer" style="max-height: 200px; overflow-y: auto; margin: 15px 0;"></div>
        <button id="startGameBtn" class="btn-main" style="background:#3b9e3d; color:white;">🚀 開始遊戲</button>
    </div>
</div>

<!-- 個人出價彈窗 (Individual Window) -->
<div id="bidModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
        <h3 id="modalPlayerTitle">玩家出價</h3>
        <div id="actionForm" class="bid-turn-input">
            <!-- 內容由 JS 動態生成 -->
        </div>
        <div id="modalFooter">
            <!-- 按鈕由 JS 動態生成 -->
        </div>
    </div>
</div>

<div class="game-container" id="gameMain" style="display:none;">
    <h1>🏡 社區奇蹟拍賣會</h1>
    <div class="sub">⚡ 公共財困境｜輪流盲標 ⚡</div>
    
    <div class="round-info-bar">
        <div class="round-tag">🎲 第 <span id="roundNum">1</span>/10 輪</div>
        <div class="round-tag">🎯 門檻 $<span id="thresholdVal">0</span></div>
        <div class="round-tag">🌟 獎勵 $<span id="rewardVal">0</span></div>
    </div>

    <div class="public-goods-showcase">
        <div style="font-size:0.9rem; font-weight:bold;">🌍 本回合專案</div>
        <div class="goods-icons" id="goodsIconsContainer"></div>
    </div>

    <div class="players-row" id="playersRow"></div>

    <div id="actionArea" style="text-align: center;">
        <button id="triggerBidBtn" class="btn-main start-turn-btn">🎯 進行當前玩家行動</button>
        <button id="resolveRoundBtn" class="btn-main resolve-btn" style="display:none;">✨ 結算本回合 ✨</button>
    </div>

    <div class="log-area" id="logPanel"></div>
    <footer>🏆 每人有4張不同魔法卡｜盲標過程保密｜10回合後結算</footer>
</div>

<script>
    // ----- 遊戲設定 -----
    const MAX_ROUNDS = 10;
    const START_FUNDS = 5000;
    const MAGIC_TYPES = { DOUBLE: "double", HALF: "half", DEFENSE: "defense", BLOCK: "block" };
    const MAGIC_NAMES = { [MAGIC_TYPES.DOUBLE]: "🔥 雙倍奉還", [MAGIC_TYPES.HALF]: "🍃 精打細算", [MAGIC_TYPES.DEFENSE]: "🛡️ 鐵壁結界", [MAGIC_TYPES.BLOCK]: "⛔ 釜底抽薪" };
    const MAGIC_EMOJI = { [MAGIC_TYPES.DOUBLE]: "⚡x2", [MAGIC_TYPES.HALF]: "✂️½", [MAGIC_TYPES.DEFENSE]: "🛡️", [MAGIC_TYPES.BLOCK]: "🚫" };
    const PUBLIC_GOODS_LIST = [
        { name: "🌳 社區森林公園", icons: ["fas fa-tree", "fas fa-leaf"] },
        { name: "📚 公共圖書館", icons: ["fas fa-book", "fas fa-university"] },
        { name: "💡 智慧路燈照明", icons: ["fas fa-lightbulb", "fas fa-sun"] },
        { name: "🚰 乾淨自來水系統", icons: ["fas fa-tint", "fas fa-water"] },
        { name: "🚌 大眾運輸網絡", icons: ["fas fa-bus", "fas fa-subway"] },
        { name: "📡 免費公共 Wi-Fi", icons: ["fas fa-wifi", "fas fa-globe"] },
        { name: "🏥 社區健康中心", icons: ["fas fa-heartbeat", "fas fa-ambulance"] },
        { name: "🚓 公共安全巡邏", icons: ["fas fa-shield-alt", "fas fa-lock"] },
        { name: "🎭 文化藝術廣場", icons: ["fas fa-music", "fas fa-palette"] },
        { name: "♻️ 資源回收站", icons: ["fas fa-recycle", "fas fa-leaf"] }
    ];

    let playersData = [];
    let currentRound = 1;
    let gameActive = true;
    let currentThreshold = 0;
    let currentReward = 0;
    let currentPlayerIndex = 0;
    let roundBids = [];
    let roundMagicIntents = [];
    let hasSubmitted = [];

    // UI 控制
    const bidModal = document.getElementById("bidModal");
    const triggerBidBtn = document.getElementById("triggerBidBtn");
    const resolveRoundBtn = document.getElementById("resolveRoundBtn");

    function addLog(msg, isError = false) {
        const logDiv = document.getElementById("logPanel");
        const entry = document.createElement("div");
        entry.style.padding = "4px 0";
        entry.style.borderBottom = "1px solid #555";
        entry.style.color = isError ? "#ffb5a7" : "#fff0cf";
        entry.innerHTML = `📢 ${msg}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function randomizeValues() {
        currentThreshold = Math.floor(Math.random() * 4001) + 500;
        currentReward = Math.floor(Math.random() * (5000 - (currentThreshold + 100) + 1)) + (currentThreshold + 100);
        document.getElementById("thresholdVal").innerText = currentThreshold.toLocaleString();
        document.getElementById("rewardVal").innerText = currentReward.toLocaleString();
    }

    function updatePublicGoodsDisplay() {
        const container = document.getElementById("goodsIconsContainer");
        const goods = PUBLIC_GOODS_LIST[(currentRound - 1) % PUBLIC_GOODS_LIST.length];
        container.innerHTML = `<span>✨ ${goods.name}</span>`;
        goods.icons.forEach(icon => {
            container.innerHTML += `<span><i class="${icon}"></i></span>`;
        });
    }

    function renderPlayersUI() {
        const container = document.getElementById("playersRow");
        container.innerHTML = "";
        playersData.forEach((p, idx) => {
            const card = document.createElement("div");
            card.className = "player-card" + (idx === currentPlayerIndex && !hasSubmitted[idx] ? " current-turn" : "");
            card.innerHTML = `
                <div class="player-name">${p.emoji} ${p.name}</div>
                <div class="funds">💰 ${p.funds.toLocaleString()}</div>
                <div style="margin-top:5px;">
                    ${Object.entries(MAGIC_NAMES).map(([type]) => `<span class="magic-badge">${MAGIC_EMOJI[type]} ${p.magicCards[type]}</span>`).join('')}
                </div>
                <div style="font-size:0.75rem; margin-top:5px; color:#666;">
                    ${hasSubmitted[idx] ? '✅ 已完成' : (idx === currentPlayerIndex ? '🎯 行動中' : '⏳ 等待')}
                </div>
            `;
            container.appendChild(card);
        });

        // 判斷按鈕顯示
        const allDone = hasSubmitted.every(v => v);
        triggerBidBtn.style.display = allDone ? "none" : "block";
        resolveRoundBtn.style.display = allDone ? "block" : "none";
        if (!allDone) triggerBidBtn.innerText = `🎯 輪到 ${playersData[currentPlayerIndex].name} 行動`;
    }

    // 開啟出價視窗
    triggerBidBtn.onclick = () => {
        const player = playersData[currentPlayerIndex];
        document.getElementById("modalPlayerTitle").innerText = `${player.emoji} ${player.name} 的行動`;
        
        let magicOptions = `<option value="">不使用魔法</option>`;
        for (const [type, name] of Object.entries(MAGIC_NAMES)) {
            if (player.magicCards[type] > 0) {
                magicOptions += `<option value="${type}">${MAGIC_EMOJI[type]} ${name}</option>`;
            }
        }

        const form = document.getElementById("actionForm");
        form.innerHTML = `
            <div>
                <label>💰 貢獻金額 (0 - ${player.funds})</label>
                <input type="number" id="tempBid" value="0" min="0" max="${player.funds}">
            </div>
            <div>
                <label>✨ 選擇魔法 (本輪剩餘如上圖)</label>
                <select id="tempMagic">${magicOptions}</select>
            </div>
            <div id="targetArea"></div>
        `;

        const magicSelect = document.getElementById("tempMagic");
        magicSelect.onchange = () => {
            const targetArea = document.getElementById("targetArea");
            if (magicSelect.value === MAGIC_TYPES.DOUBLE || magicSelect.value === MAGIC_TYPES.BLOCK) {
                let targets = playersData.filter(p => p.id !== player.id)
                    .map(p => `<option value="${p.id}">${p.emoji} ${p.name}</option>`).join('');
                targetArea.innerHTML = `<label>🎯 選擇目標</label><select id="tempTarget">${targets}</select>`;
            } else {
                targetArea.innerHTML = "";
            }
        };

        // 按鈕邏輯：最後一人不顯示「下一位」，其餘人只顯示「下一位」
        const footer = document.getElementById("modalFooter");
        const isLastPlayer = hasSubmitted.filter(v => !v).length === 1;

        if (isLastPlayer) {
            footer.innerHTML = `<button class="btn-main resolve-btn" onclick="submitBid(true)">完成並準備結算</button>`;
        } else {
            footer.innerHTML = `<button class="btn-main next-btn" onclick="submitBid(false)">下一位玩家</button>`;
        }

        bidModal.style.display = "flex";
    };

    window.submitBid = (isLast) => {
        const bidVal = Math.min(Math.max(parseInt(document.getElementById("tempBid").value) || 0, 0), playersData[currentPlayerIndex].funds);
        const magicType = document.getElementById("tempMagic").value;
        let targetId = null;
        if (magicType === MAGIC_TYPES.DOUBLE || magicType === MAGIC_TYPES.BLOCK) {
            targetId = parseInt(document.getElementById("tempTarget").value);
        }

        roundBids[currentPlayerIndex] = bidVal;
        roundMagicIntents[currentPlayerIndex] = magicType ? { type: magicType, targetId: targetId } : null;
        hasSubmitted[currentPlayerIndex] = true;

        addLog(`🔒 ${playersData[currentPlayerIndex].name} 已提交盲標。`);
        bidModal.style.display = "none";

        if (!isLast) {
            currentPlayerIndex = hasSubmitted.indexOf(false);
        }
        renderPlayersUI();
    };

    resolveRoundBtn.onclick = () => {
        // 結算邏輯
        let contribution = new Map();
        let payment = new Map();
        playersData.forEach((p, i) => {
            contribution.set(p.id, roundBids[i]);
            payment.set(p.id, roundBids[i]);
        });

        // 魔法處理
        let magicList = roundMagicIntents.map((m, i) => m ? { casterId: playersData[i].id, ...m } : null).filter(x => x);
        let defenses = new Set(magicList.filter(m => m.type === MAGIC_TYPES.DEFENSE).map(m => m.casterId));

        magicList.forEach(m => {
            const caster = playersData.find(p => p.id === m.casterId);
            if (m.type === MAGIC_TYPES.HALF) {
                payment.set(m.casterId, Math.floor(payment.get(m.casterId) / 2));
            } else if ((m.type === MAGIC_TYPES.DOUBLE || m.type === MAGIC_TYPES.BLOCK) && defenses.has(m.targetId)) {
                addLog(`🛡️ ${playersData.find(p => p.id === m.targetId).name} 擋住了來自 ${caster.name} 的攻擊！`);
                return;
            } else if (m.type === MAGIC_TYPES.DOUBLE) {
                contribution.set(m.targetId, contribution.get(m.targetId) * 2);
                payment.set(m.targetId, Math.min(payment.get(m.targetId) * 2, playersData.find(p => p.id === m.targetId).funds));
            }
            // 消耗卡片
            caster.magicCards[m.type]--;
        });

        let total = 0;
        playersData.forEach(p => {
            let pPay = Math.min(payment.get(p.id), p.funds);
            p.funds -= pPay;
            total += contribution.get(p.id);
        });

        const success = total >= currentThreshold;
        addLog(`📊 總貢獻: $${total} (門檻$${currentThreshold}) → ${success ? '✅ 成功' : '❌ 失敗'}`);

        if (success) {
            const blocks = new Set(magicList.filter(m => m.type === MAGIC_TYPES.BLOCK && !defenses.has(m.targetId)).map(m => m.targetId));
            playersData.forEach(p => {
                if (!blocks.has(p.id)) {
                    p.funds += currentReward;
                    addLog(`🎉 ${p.name} 獲得獎勵 $${currentReward}`);
                } else {
                    addLog(`⛔ ${p.name} 被封鎖，無法領取獎勵。`);
                }
            });
        }

        if (currentRound >= MAX_ROUNDS) {
            gameActive = false;
            renderPlayersUI();
            addLog("🎊 遊戲結束！請看上方最終資金。");
            triggerBidBtn.style.display = "none";
            resolveRoundBtn.style.display = "none";
        } else {
            currentRound++;
            document.getElementById("roundNum").innerText = currentRound;
            initRound();
        }
    };

    function initRound() {
        randomizeValues();
        updatePublicGoodsDisplay();
        currentPlayerIndex = 0;
        roundBids = new Array(playersData.length).fill(0);
        roundMagicIntents = new Array(playersData.length).fill(null);
        hasSubmitted = new Array(playersData.length).fill(false);
        renderPlayersUI();
    }

    // 設定與啟動
    const genBtn = document.getElementById("generateNameFields");
    genBtn.onclick = () => {
        const count = Math.min(Math.max(parseInt(document.getElementById("playerCountInput").value), 2), 6);
        const container = document.getElementById("playerNamesContainer");
        container.innerHTML = "";
        for (let i = 0; i < count; i++) {
            container.innerHTML += `<input type="text" id="pName${i}" value="玩家${i+1}" style="width:80%; margin:5px; padding:8px; border-radius:10px; border:1px solid #ccc;">`;
        }
    };
    genBtn.click();

    document.getElementById("startGameBtn").onclick = () => {
        const count = Math.min(Math.max(parseInt(document.getElementById("playerCountInput").value), 2), 6);
        playersData = [];
        const emojis = ["🌻","🐻","🦊","🐧","🐱","🐼"];
        for (let i = 0; i < count; i++) {
            playersData.push({
                id: i,
                name: document.getElementById(`pName${i}`).value || `玩家${i+1}`,
                emoji: emojis[i],
                funds: START_FUNDS,
                magicCards: { [MAGIC_TYPES.DOUBLE]: 1, [MAGIC_TYPES.HALF]: 1, [MAGIC_TYPES.DEFENSE]: 1, [MAGIC_TYPES.BLOCK]: 1 }
            });
        }
        document.getElementById("setupOverlay").style.display = "none";
        document.getElementById("gameMain").style.display = "block";
        initRound();
    };
</script>
</body>
</html>
